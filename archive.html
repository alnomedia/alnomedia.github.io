<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Works — AlnoMedia | Alexander Nodelman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500&family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0b09; --ink-2:#101210; --emerald:#17c67c; --cream:#f2ecdc; --cream-dim:rgba(242,236,220,.55);
  --display:'Anton',sans-serif; --condensed:'Oswald',sans-serif; --body:'Archivo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--ink);color:var(--cream)}
body{font-family:var(--body);-webkit-font-smoothing:antialiased;min-height:100vh}
::selection{background:var(--emerald);color:var(--ink)}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

.grain{position:fixed;inset:-100%;z-index:200;pointer-events:none;opacity:.07;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:grain 8s steps(10) infinite}
@keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-5%,-10%)}20%{transform:translate(-15%,5%)}30%{transform:translate(7%,-25%)}40%{transform:translate(-5%,25%)}50%{transform:translate(-15%,10%)}60%{transform:translate(15%,0)}70%{transform:translate(0,15%)}80%{transform:translate(3%,35%)}90%{transform:translate(-10%,10%)}}

nav{position:sticky;top:0;z-index:140;display:flex;justify-content:space-between;align-items:center;
  padding:1.4rem 2.2rem;background:linear-gradient(rgba(10,11,9,.92),rgba(10,11,9,.75) 70%,transparent)}
nav .logo{font-family:var(--display);font-size:1.25rem;letter-spacing:.06em}
nav .logo em{font-style:normal;color:var(--emerald)}
nav .back{font-family:var(--condensed);font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;color:var(--cream-dim);transition:color .3s}
nav .back:hover{color:var(--emerald)}

header.page{padding:10vh 6vw 6vh}
header.page .kicker{font-family:var(--condensed);font-weight:300;letter-spacing:.45em;text-transform:uppercase;font-size:.8rem;color:var(--emerald);margin-bottom:1.2rem}
header.page h1{font-family:var(--display);font-size:clamp(2.6rem,8vw,7.5rem);line-height:.95;text-transform:uppercase}
header.page h1 span{color:var(--emerald)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;padding:0 6vw 14vh}
.work{background:var(--ink-2);border:1px solid rgba(242,236,220,.1);cursor:pointer;overflow:hidden;
  opacity:0;transform:translateY(40px);transition:border-color .4s}
.work.in{animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
.work:hover{border-color:var(--emerald)}
.work .thumb{position:relative;aspect-ratio:16/9;overflow:hidden}
.work .thumb img{width:100%;height:100%;object-fit:cover;transform:scale(1.02);transition:transform .8s cubic-bezier(.2,.7,.2,1);filter:saturate(.9) contrast(1.05)}
.work:hover .thumb img{transform:scale(1.1)}
.work .play{position:absolute;top:50%;left:50%;width:58px;height:58px;border-radius:50%;transform:translate(-50%,-50%) scale(.8);
  background:rgba(10,11,9,.55);border:1px solid var(--emerald);display:flex;align-items:center;justify-content:center;opacity:0;transition:.4s}
.work:hover .play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.work .play::after{content:"";margin-left:3px;border-left:13px solid var(--emerald);border-top:8px solid transparent;border-bottom:8px solid transparent}
.work .meta{padding:1.1rem 1.2rem 1.3rem}
.work .meta .tag{font-family:var(--condensed);font-weight:300;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--emerald)}
.work .meta h3{font-family:var(--display);font-size:1.15rem;text-transform:uppercase;line-height:1.2;margin-top:.55rem;font-weight:400}

#lightbox{position:fixed;inset:0;z-index:250;background:rgba(6,7,6,.92);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:.4s}
#lightbox.open{opacity:1;visibility:visible}
#lightbox .frame{position:relative;width:min(1100px,92vw)}
#lightbox .frame.vertical{width:min(420px,92vw)}
#lightbox .ratio{position:relative;padding-top:56.25%}
#lightbox .frame.vertical .ratio{padding-top:177.78%}
#lightbox iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
#lightbox .close{position:absolute;top:-3rem;right:0;font-family:var(--condensed);letter-spacing:.3em;font-size:.8rem;text-transform:uppercase;color:var(--cream);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:.6rem}
#lightbox .close::after{content:"✕";color:var(--emerald);font-size:1rem}

footer{border-top:1px solid rgba(242,236,220,.12);padding:2.4rem 6vw;display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;
  font-family:var(--condensed);font-weight:300;font-size:.78rem;letter-spacing:.24em;text-transform:uppercase;color:var(--cream-dim)}
footer a:hover{color:var(--emerald)}
</style>
</head>
<body>

<div class="grain"></div>

<nav>
  <a class="logo" href="index.html">ALNO<em>MEDIA</em></a>
  <a class="back" href="index.html">← Back to Home</a>
</nav>

<header class="page">
  <div class="kicker">Archive</div>
  <h1>All <span>Works</span></h1>
</header>

<div class="grid" id="grid"></div>

<div id="lightbox">
  <div class="frame" id="lbFrame">
    <button class="close" id="lbClose">Close</button>
    <div class="ratio"><iframe id="lbIframe" src="" title="Video player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div>
  </div>
</div>

<footer>
  <a href="https://wa.me/972523949964" target="_blank" rel="noopener">WhatsApp — (+972) 52-3949964</a>
  <a href="mailto:Alexno1996@gmail.com">Alexno1996@gmail.com</a>
</footer>

<script>
/* ================= ADD YOUR WORKS HERE =================
   Each entry: { title, tag, url }  — url is any YouTube link
   (normal videos or /shorts/ links both work).             */
const WORKS = [
  { title:"People Asleep And The Water As Well", tag:"Documentary",       url:"https://youtu.be/q7d3TJwpQN0" },
  { title:"Team Aguia",                          tag:"Sports Edit",       url:"https://youtube.com/shorts/GeG0s-HBKrc?feature=share" },
  { title:"Branding Using AI",                   tag:"AI Commercial",     url:"https://youtube.com/shorts/jL8bNQzF1D4?feature=share" },
  { title:"Parazit",                             tag:"TV Pilot",          url:"https://youtu.be/_zbL2xkuW9I" },
  { title:"Why Do You Live Here?",               tag:"Web Documentary",   url:"https://youtu.be/1Hc2y_rnIWo" },
  { title:"Kedma",                               tag:"Testimonials",      url:"https://youtube.com/shorts/qGjQX5CIoz0" },
  { title:"Community Mindset",                   tag:"Webinar Shorts",    url:"https://youtu.be/Olf8989SJlc" },
  { title:"PaintGem",                            tag:"Brand TikTok Ad",   url:"https://youtube.com/shorts/AEI1en_rB9U" },
  { title:"Real Estate",                         tag:"Podcast Shorts",    url:"https://youtube.com/shorts/g96kcrGEtP8" },
  { title:"Blendjit",                            tag:"Brand Facebook Ad", url:"https://youtube.com/shorts/K6XpbUz8y4A" },
  { title:"Blendjit",                            tag:"Brand AI Ad",       url:"https://youtube.com/shorts/e4TV3nffLJM" },
  { title:"Glimpse To My Own Documentary",       tag:"Ongoing Work",      url:"https://youtu.be/YEU7ukMNhsk" },
  /* Coming soon:
  { title:"Mush", tag:"Brand Animated AI Ad", url:"https://youtu.be/XXXXXXXXXXX" },
  { title:"Mush", tag:"Brand Prestige AI Ad", url:"https://youtu.be/XXXXXXXXXXX" },
  */
];
/* ======================================================= */

function ytId(url){
  const m = url.match(/(?:youtu\.be\/|shorts\/|watch\?v=|embed\/)([\w-]{11})/);
  return m ? m[1] : null;
}
const isShort = url => /\/shorts\//.test(url);

const grid = document.getElementById('grid');
WORKS.forEach((w,i)=>{
  const id = ytId(w.url); if(!id) return;
  const el = document.createElement('div');
  el.className='work';
  el.innerHTML = `
    <div class="thumb"><img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="${w.title}" loading="lazy"><div class="play"></div></div>
    <div class="meta"><div class="tag">${w.tag||'Project'}</div><h3>${w.title}</h3></div>`;
  el.addEventListener('click',()=>openLb(id, isShort(w.url)));
  grid.appendChild(el);
  setTimeout(()=>el.classList.add('in'), 90*i);
});

const lb=document.getElementById('lightbox'), lbIf=document.getElementById('lbIframe'), lbFr=document.getElementById('lbFrame');
function openLb(id, vertical){
  lbFr.classList.toggle('vertical', vertical);
  lbIf.src=`https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
  lb.classList.add('open');
}
function closeLb(){lb.classList.remove('open');lbIf.src='';}
document.getElementById('lbClose').addEventListener('click',closeLb);
lb.addEventListener('click',e=>{if(e.target===lb)closeLb();});
addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
</script>
</body>
</html>
